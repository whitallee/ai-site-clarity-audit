<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messaging Clarity Analyzer</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Messaging Clarity Analyzer</h1>
      <p class="subtitle">Paste a URL and get an instant AI-powered clarity report</p>
    </header>

    <div class="card" id="form-card">
      <form id="audit-form">
        <div class="input-row">
          <input
            type="text"
            id="url-input"
            placeholder="https://example.com"
            autocomplete="off"
            spellcheck="false"
          >
          <button type="submit" id="submit-btn">Analyze</button>
        </div>
      </form>
    </div>

    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <p>Scraping site and running AI analysis&hellip;<br><small>Usually takes 15–30 seconds</small></p>
    </div>

    <div id="error-box" class="hidden error-box"></div>

    <div id="results" class="hidden">
      <div class="score-card">
        <div class="score-left">
          <div class="score-number" id="clarity-score"></div>
          <div class="score-label">out of 10</div>
        </div>
        <div class="score-right">
          <div class="what-label">What this site does</div>
          <p id="what-it-does"></p>
        </div>
        <a id="pdf-link" class="btn-pdf" href="#" target="_blank">Download PDF</a>
      </div>

      <div class="suggestions-card">
        <h2>Suggestions to Improve Clarity</h2>
        <ul id="suggestions"></ul>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
